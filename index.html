<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSX Familiar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="scene-container"></div>
    
    <div id="stats-panel">
        <h3>Little Guy</h3>
        <div id="state-display" class="state-badge">idle</div>
        <div class="stat">
            <label>Hunger</label>
            <div class="stat-bar">
                <div id="hunger-fill" class="stat-fill"></div>
            </div>
            <span id="hunger-value">50</span>
        </div>
        <div class="stat">
            <label>Energy</label>
            <div class="stat-bar">
                <div id="energy-fill" class="stat-fill"></div>
            </div>
            <span id="energy-value">75</span>
        </div>
        <div class="stat">
            <label>Excitement</label>
            <div class="stat-bar">
                <div id="excitement-fill" class="stat-fill"></div>
            </div>
            <span id="excitement-value">50</span>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
